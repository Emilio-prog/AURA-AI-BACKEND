name: CI Backend

on:
  pull_request:
  push:
    branches:
      - develop
      - feature
      - feature/**
      - bugfix/**
      - release
      - release/**
      - hotfix
      - hotfix/**

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x ./mvnw

      - name: Run tests
        run: ./mvnw -B test

      - name: Verify package builds
        run: ./mvnw -B -DskipTests package

      - name: Build Docker image (no push)
        run: docker build -t aura-ai-backend:ci-${{ github.sha }} .
