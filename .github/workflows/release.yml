name: Release Backend

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: emilio-prog/aura-ai-backend

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x ./mvnw

      - name: Run tests
        run: ./mvnw -B test

      - name: Verify package builds
        run: ./mvnw -B -DskipTests package

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Validate Dokploy target
        run: |
          DOKPLOY_API_URL="${{ secrets.DOKPLOY_API_URL }}"
          COMPOSE_ID="${{ secrets.DOKPLOY_BACKEND_COMPOSE_ID }}"

          if [ -z "$DOKPLOY_API_URL" ] || [ -z "$COMPOSE_ID" ]; then
            echo "::error::DOKPLOY_API_URL and DOKPLOY_BACKEND_COMPOSE_ID must point to the self-hosted Hostinger VPS Dokploy instance."
            exit 1
          fi

          case "$DOKPLOY_API_URL" in
            *dokploy.com*|*dokploy.cloud*|*cloud.dokploy*)
              echo "::error::DOKPLOY_API_URL appears to point to Dokploy Cloud. Use the self-hosted Hostinger VPS Dokploy URL."
              exit 1
              ;;
          esac

      - name: Trigger Dokploy deploy
        run: |
          DOKPLOY_API_URL="${{ secrets.DOKPLOY_API_URL }}"
          DOKPLOY_API_URL="${DOKPLOY_API_URL%/}"

          curl -fsS -X POST "$DOKPLOY_API_URL/api/compose.deploy" \
               -H "accept: application/json" \
               -H "Content-Type: application/json" \
               -H "x-api-key: ${{ secrets.DOKPLOY_API_KEY }}" \
               -d '{"composeId":"${{ secrets.DOKPLOY_BACKEND_COMPOSE_ID }}"}'
