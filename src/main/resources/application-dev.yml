spring:
  flyway:
    baseline-on-migrate: ${FLYWAY_BASELINE_ON_MIGRATE:true}
    baseline-version: ${FLYWAY_BASELINE_VERSION:1}
  jpa:
    show-sql: false

app:
  email:
    auto-verify-when-disabled: ${EMAIL_AUTO_VERIFY_WHEN_DISABLED:true}
  dev-demo-user:
    enabled: ${DEV_DEMO_USER_ENABLED:false}
    email: ${DEV_DEMO_USER_EMAIL:demo@aura.ai}
    password: ${DEV_DEMO_USER_PASSWORD:}
