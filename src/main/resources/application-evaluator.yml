spring:
  datasource:
    url: jdbc:h2:mem:aura_evaluator;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;INIT=CREATE DOMAIN IF NOT EXISTS JSONB AS JSON\;CREATE DOMAIN IF NOT EXISTS TEXT AS VARCHAR
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

app:
  email:
    enabled: false
    auto-verify-when-disabled: true
  ai:
    enabled: false
  turnstile:
    enabled: false
  content-encryption:
    required: false
  web-push:
    enabled: false
    scheduler-enabled: false
  google-oauth:
    enabled: false
  sos-sms:
    enabled: false
  dev-demo-user:
    enabled: true
    email: demo@aura.ai
    password: StrongPassword123!
