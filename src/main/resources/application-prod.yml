spring:
  flyway:
    baseline-on-migrate: ${FLYWAY_BASELINE_ON_MIGRATE:true}
    baseline-version: ${FLYWAY_BASELINE_VERSION:1}
    out-of-order: ${SPRING_FLYWAY_OUT_OF_ORDER:false}
    ignore-migration-patterns: "${SPRING_FLYWAY_IGNORE_MIGRATION_PATTERNS:*:missing}"
  jpa:
    show-sql: false

logging:
  level:
    com.auraia.backend: INFO
    org.springframework.security: WARN

app:
  content-encryption:
    required: ${CONTENT_ENCRYPTION_REQUIRED:true}
