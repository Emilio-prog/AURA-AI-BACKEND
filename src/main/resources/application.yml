spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: aura-ai-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/aura}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
  flyway:
    enabled: true
    schemas: public
    default-schema: public
    baseline-on-migrate: ${FLYWAY_BASELINE_ON_MIGRATE:true}
    baseline-version: ${FLYWAY_BASELINE_VERSION:1}
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:1025}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SMTP_AUTH:true}
          starttls:
            enable: ${SMTP_STARTTLS:true}
  messages:
    basename: messages
    encoding: UTF-8
  jackson:
    time-zone: UTC
    default-property-inclusion: non_null

server:
  port: ${SERVER_PORT:8080}
  error:
    include-stacktrace: never
    include-message: always

management:
  health:
    mail:
      enabled: ${MAIL_HEALTH_ENABLED:false}
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

app:
  api-base-path: /api/v1
  frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:5173}
  admin-emails: ${ADMIN_EMAILS:}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  jwt:
    secret: ${JWT_SECRET:MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWYwMTIzNDU2Nzg5YWJjZGVmMDEyMzQ1Njc4OWFiY2RlZg==}
    access-token-expiration-ms: ${JWT_EXPIRATION_MS:900000}
    refresh-token-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}
  email:
    enabled: ${EMAIL_ENABLED:true}
    auto-verify-when-disabled: ${EMAIL_AUTO_VERIFY_WHEN_DISABLED:false}
    from: ${SMTP_FROM:no-reply@aura.ai}
    verification-token-ttl-hours: ${EMAIL_VERIFICATION_TTL_HOURS:24}
    password-reset-token-ttl-minutes: ${PASSWORD_RESET_TTL_MINUTES:30}
  ai:
    service-url: ${AI_SERVICE_URL:http://localhost:8000}
    enabled: ${AI_SERVICE_ENABLED:false}
    timeout-ms: ${AI_SERVICE_TIMEOUT_MS:3000}
  rate-limit:
    auth-capacity: ${AUTH_RATE_LIMIT_CAPACITY:5}
    auth-refill-minutes: ${AUTH_RATE_LIMIT_REFILL_MINUTES:1}
  webhook:
    resend-secret: ${RESEND_WEBHOOK_SECRET:}
  turnstile:
    enabled: ${TURNSTILE_ENABLED:false}
    site-key: ${TURNSTILE_SITE_KEY:}
    secret-key: ${TURNSTILE_SECRET_KEY:}
    timeout-ms: ${TURNSTILE_TIMEOUT_MS:4000}
